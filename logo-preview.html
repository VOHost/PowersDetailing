<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Logo Preview – Powers Detailing Services</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; }
    .preview { padding: 40px; display: flex; align-items: center; justify-content: center; }
    .white  { background: #ffffff; }
    .light  { background: #f0f8ff; }
    .dark   { background: #1a2a3a; }
    .black  { background: #111111; }
    h3 { text-align: center; margin: 0 0 12px; font-size: 13px; color: #888; font-weight: normal; }
    .swatch { margin: 20px; }
  </style>
</head>
<body>
  <div style="display:flex; flex-wrap:wrap; justify-content:center; padding:20px;">
    <div class="swatch">
      <h3>White background</h3>
      <div class="preview white"><img src="logo.svg" alt="Powers Detailing Logo"></div>
    </div>
    <div class="swatch">
      <h3>Light blue background</h3>
      <div class="preview light"><img src="logo.svg" alt="Powers Detailing Logo"></div>
    </div>
    <div class="swatch">
      <h3>Dark background</h3>
      <div class="preview dark"><img src="logo.svg" alt="Powers Detailing Logo"></div>
    </div>
    <div class="swatch">
      <h3>Black background</h3>
      <div class="preview black"><img src="logo.svg" alt="Powers Detailing Logo"></div>
    </div>
  </div>
</body>
</html>
